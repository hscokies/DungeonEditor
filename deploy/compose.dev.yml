services:     
  postgres:
    image: bitnami/postgresql
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRESQL_POSTGRES_PASSWORD: postgres
      POSTGRESQL_PASSWORD: postgres
    networks:
      - database
    volumes:
      - pgsql_data:/bitnami/postgresql

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9001:9001"
      - "9000:9000"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: str0ng_password 
    networks:
      - blob-storage
    volumes:
      - minio_data:/data
  
  rabbitmq:
    image: rabbitmq:management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: str0ng_password
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

############################################

volumes:
  minio_data:
  pgsql_data:
  rabbitmq_data:

networks:
  database:
    external: true
  blob-storage:
    external: true